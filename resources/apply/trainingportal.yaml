apiVersion: training.educates.dev/v1beta1
kind: TrainingPortal
metadata:
  name: spring-guides
spec:
  portal:
    title: Spring Academy / Guides
    updates:
      workshop: true
    sessions:
      maximum: 30
    workshop:
      defaults:
        capacity: 1
        reserved: ${TRAINING_PORTAL_RESERVED}
        expires: 60m
        orphaned: 5m
    theme:
      frame:
        ancestors:
        - https://spring.academy
        - https://*.spring.academy
        - https://*.vmware.com
        - https://*.broadcom.com
        - https://spring-staging.academy
        - https://spring-academy.broadcom.com
        - https://spring-academy-verify.broadcom.com
        - https://spring-academy-qa.broadcom.net
        - https://spring-academy-dev.broadcom.net
        - http://localhost:8080
  analytics:
    google:
      trackingId: "${ANALYTICS_GOOGLE_ID}"
    clarity:
      trackingId: "${ANALYTICS_CLARITY_ID}"
  workshops:
    - name: spring-academy-guides-upgrade-from-spring-boot-2x-to-3x
      reserved: 0
    - name: spring-academy-guides-upgrading-boot-jdk-8-to-17
    - name: spring-academy-guides-upgrade-boot-2x-to-3x-in-practice
      reserved: 0
    - name: spring-academy-guides-workshop-automating-upgrades
      expires: 2h
      reserved: 0
    - name: spr-guides-spring-modulith-deep-dive
      expires: 10h
      reserved: 0
